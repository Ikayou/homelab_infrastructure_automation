services:
  zabbix-db:
    image: postgres:16-alpine
    volumes:
      - ./zbx_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix_pwd
      - POSTGRES_DB=zabbix

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-latest
    ports:
      - "10051:10051"
    environment:
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix_pwd
      - POSTGRES_DB=zabbix
    depends_on:
      - zabbix-db

  zabbix-web:
    image: zabbix/zabbix-web-apache-pgsql:alpine-latest
    ports:
      - "8080:8080"
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - DB_SERVER_HOST=zabbix-db
      - POSTGRES_USER=zabbix
      - POSTGRES_PASSWORD=zabbix_pwd
      - POSTGRES_DB=zabbix
      - PHP_TZ=Europe/Berlin
    labels:
      - "homepage.group=Infrastructure"
      - "homepage.name=Zabbix"
      - "homepage.icon=zabbix"
      - "homepage.href=http://192.168.10.100:8080"
      - "homepage.description=Network Monitoring"
    depends_on:
      - zabbix-server

  zabbix-agent:
    image: zabbix/zabbix-agent:alpine-latest
    
    privileged: true
    user: root
    volumes:
      - /proc:/host/proc
      - /sys:/host/sys
      - /:/hostfs:ro
      - /var/run/docker.sock:/var/run/docker.sock 
    environment:
      - ZBX_HOSTNAME=Ikadoc001
      - ZBX_SERVER_HOST=zabbix-server
    depends_on:
      - zabbix-server
