---
- name: "Zabbix-Überwachung automatisieren (Berlin/Deutsch)"
  hosts: all
  become: yes
  tasks:
    - name: "Zabbix-Repository hinzufügen (AlmaLinux/RHEL 9)"
      dnf:
        name: "https://repo.zabbix.com/zabbix/7.0/alma/9/x86_64/zabbix-release-7.0-5.el9.noarch.rpm"
        state: present
        disable_gpg_check: yes

    - name: "DNF-Cache leeren (Metadaten aktualisieren)"
      command: dnf clean all

    - name: "Zabbix-Agent installieren"
      dnf:
        name: "zabbix-agent"
        state: present

    - name: "Zabbix-Agent Konfiguration anpassen (Server IP setzen)"
      lineinfile:
        path: /etc/zabbix/zabbix_agentd.conf
        regexp: '^Server='
        line: "Server=192.168.10.100"

    - name: "Zabbix-Agent Dienst starten und aktivieren"
      service:
        name: "zabbix-agent"
        state: started
        enabled: yes

    - name: "Firewall für Zabbix-Agent öffnen (Port 10050)"
      shell: "firewall-cmd --add-port=10050/tcp --permanent && firewall-cmd --reload"
      ignore_errors: yes
