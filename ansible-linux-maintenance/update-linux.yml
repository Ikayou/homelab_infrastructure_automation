# update-linux.yml
---
- name: Update Linux servers
  hosts: linux_servers
  become: true

  tasks:
    - name: Update Debian/Ubuntu packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
      when: ansible_os_family == "Debian"

    - name: Update Alma/Rocky/RHEL packages
      ansible.builtin.dnf:
        name: "*"
        state: latest
      when: ansible_os_family == "RedHat"

    - name: Install dnf-utils on RedHat family
      ansible.builtin.dnf:
        name: dnf-utils
        state: present
      when: ansible_os_family == "RedHat"

    - name: Check reboot required on Debian/Ubuntu
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_debian
      when: ansible_os_family == "Debian"

    - name: Check reboot required on Alma/Rocky/RHEL
      ansible.builtin.command: needs-restarting -r
      register: reboot_required_redhat
      failed_when: false
      changed_when: reboot_required_redhat.rc != 0
      when: ansible_os_family == "RedHat"

    - name: Reboot Debian/Ubuntu if required
      ansible.builtin.reboot:
        msg: "Reboot after Linux update by Ansible"
        reboot_timeout: 600
      when:
        - ansible_os_family == "Debian"
        - reboot_required_debian.stat.exists

    - name: Reboot Alma/Rocky/RHEL if required
      ansible.builtin.reboot:
        msg: "Reboot after Linux update by Ansible"
        reboot_timeout: 600
      when:
        - ansible_os_family == "RedHat"
        - reboot_required_redhat.rc != 0
